<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindAR Multi-Target & Multi-Model</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="model0" src="./이상해씨.glb"></a-asset-item>
      <a-asset-item id="model1" src="./리자몽.glb"></a-asset-item>
      <a-asset-item id="model2" src="./이브이.glb"></a-asset-item>
      <a-asset-item id="model3" src="./뮤츠.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model class="ar-model" src="#model0" rotation="90 360 360" position="0 0 0" scale="80 80 80"
        animation-mixer="clip: *; loop: repeat;">
      </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model class="ar-model" src="#model1" rotation="90 360 360" position="0 0 0" scale="0.6 0.6 0.6"
        animation-mixer="clip: *; loop: repeat;">
      </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model class="ar-model" src="#model2" rotation="90 360 360" position="0 0 0" scale="0.5 0.5 0.5"
        animation-mixer="clip: *; loop: repeat;">
      </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3">
      <a-gltf-model class="ar-model" src="#model3" rotation="90 360 360" position="0 0 0" scale="0.6 0.6 0.6"
        animation-mixer="clip: *; loop: repeat;">
      </a-gltf-model>
    </a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="0 10 5" intensity="0.8"></a-light>

  </a-scene>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const models = document.querySelectorAll(".ar-model");

      models.forEach((model) => {
        model.addEventListener("model-loaded", (e) => {
          const fileName = model.getAttribute('src');
          const gltf = e.detail.model;

          console.log(`✅ 모델 로드됨: ${fileName}`);

          if (gltf.animations && gltf.animations.length > 0) {
            console.log(`🎬 [${fileName}] 애니메이션 목록:`);
            gltf.animations.forEach((clip, index) => {
              console.log(`   ${index}: ${clip.name}`);
            });
          } else {
            console.log(`❌ [${fileName}] 애니메이션 데이터가 없습니다.`);
          }
        });
      });
    });
  </script>

</body>

</html>
