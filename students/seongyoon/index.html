<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindAR + A-Frame WebAR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <!-- animation-mixer 사용 필수 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="monsterModel" src="./monster.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-gltf-model id="monster" src="#monsterModel" rotation="-90 -180 0" position="0 0 0" scale="0.8 0.8 0.8"
        animation-mixer="clip: pm0006_00_00_20400_attack01; loop: repeat; timeScale: 1">
      </a-gltf-model>
    </a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="0 10 5" intensity="0.8"></a-light>

  </a-scene>

  <!-- 🔥 여기 추가 (가장 중요) -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const model = document.querySelector("#monster");

      model.addEventListener("model-loaded", (e) => {
        console.log("✅ 모델 로딩 완료");

        const gltf = e.detail.model;

        if (!gltf.animations || gltf.animations.length === 0) {
          console.log("❌ 애니메이션 없음");
        } else {
          console.log("🎬 애니메이션 목록:");
          gltf.animations.forEach((clip, index) => {
            console.log(index + ":", clip.name);
          });
        }
      });
    });
  </script>

</body>

</html>
