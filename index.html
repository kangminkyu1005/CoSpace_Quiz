<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MindAR Tap Place Image</title>

  <!-- A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>

  <!-- MindAR (A-Frame plugin) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
    .hint {
      position: fixed; left: 12px; right: 12px; bottom: 12px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(0,0,0,0.55); color: #fff;
      font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="hint">
    1) 카메라 권한 허용<br>
    2) 타겟 이미지를 비추면 앵커가 잡힘<br>
    3) 화면을 터치하면 그 위치에 이미지가 생성됨
  </div>

  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/targets.mind;
                 autoStart: true; uiScanning: true; uiError: true;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 타겟(마커/이미지) 0번을 인식했을 때의 기준 앵커 -->
    <a-entity id="anchor" mindar-image-target="targetIndex: 0">
      <!-- 터치 위치 계산용 '보이지 않는' 평면(타겟 위 바닥 역할) -->
      <a-plane id="hitPlane" width="1.2" height="1.2"
               position="0 0 0" rotation="0 0 0"
               material="transparent:true; opacity:0.0"
               class="clickable">
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    // === 설정 ===
    // 생성할 "테스트 이미지" (원하는 PNG로 바꿔도 됨)
    const STICKER_URL = "https://threejs.org/examples/textures/uv_grid_opengl.jpg";
    const STICKER_SIZE = 0.18; // 타겟 위에서의 크기(단위: 미터 비슷한 스케일)

    const sceneEl = document.querySelector("a-scene");
    const anchorEl = document.getElementById("anchor");
    const planeEl  = document.getElementById("hitPlane");

    // Three.js Raycaster
    const raycaster = new THREE.Raycaster();
    const mouseNdc = new THREE.Vector2();

    // 터치/클릭 이벤트 (모바일/PC 모두)
    window.addEventListener("pointerdown", (e) => {
      // 타겟이 아직 인식되지 않았으면 배치 불가
      if (!anchorEl.object3D.visible) return;

      // 화면좌표 → NDC(-1~1)
      const w = window.innerWidth;
      const h = window.innerHeight;
      mouseNdc.x = (e.clientX / w) * 2 - 1;
      mouseNdc.y = -(e.clientY / h) * 2 + 1;

      // A-Frame 카메라
      const camera = sceneEl.camera;
      if (!camera) return;

      raycaster.setFromCamera(mouseNdc, camera);

      // hitPlane(타겟 위 평면)과 교차점 계산
      const planeObj = planeEl.getObject3D("mesh");
      if (!planeObj) return;

      const hits = raycaster.intersectObject(planeObj, true);
      if (!hits || hits.length === 0) return;

      const p = hits[0].point; // 월드 좌표 교차점

      // 월드좌표 → anchor 로컬좌표로 변환해서, 타겟에 "붙어있게" 만들기
      const localP = anchorEl.object3D.worldToLocal(p.clone());

      // 스티커 엔티티 생성
      const sticker = document.createElement("a-plane");
      sticker.setAttribute("width", STICKER_SIZE);
      sticker.setAttribute("height", STICKER_SIZE);
      sticker.setAttribute("position", `${localP.x} ${localP.y} ${localP.z + 0.001}`); // z-fighting 방지로 살짝 띄움
      sticker.setAttribute("rotation", "0 0 0");
      sticker.setAttribute("material", `src:${STICKER_URL}; transparent:true;`);
      anchorEl.appendChild(sticker);
    });
  </script>
</body>
</html>
