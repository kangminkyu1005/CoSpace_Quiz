<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR 최종 해결 버전</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('tap-to-place', {
        init: function () {
          // 화면 전체 클릭 이벤트
          window.addEventListener('click', () => {
            const sceneEl = this.el;
            const cameraEl = document.querySelector('[camera]');
            
            // 1. 새로운 표시 객체(구체) 생성
            const newPoint = document.createElement('a-sphere');
            newPoint.setAttribute('radius', '0.1');
            newPoint.setAttribute('color', '#FF4500'); // 선명한 주황색
            newPoint.setAttribute('material', 'shader: flat;');

            // 2. 카메라 앞 1미터 지점 계산 (에러 났던 point 대신 사용)
            const cameraOrbit = cameraEl.object3D;
            const position = new THREE.Vector3(0, 0, -1); // 카메라 정면 1m 앞
            position.applyQuaternion(cameraOrbit.quaternion);
            position.add(cameraOrbit.position);

            newPoint.setAttribute('position', position);
            
            // 3. 장면에 추가
            sceneEl.appendChild(newPoint);
            console.log("포인트 생성 완료:", position);
          });
        }
      });
    </script>
    <style>
      /* 카메라 권한 요청 시 배경이 검게 보이지 않도록 처리 */
      body { margin: 0; overflow: hidden; background-color: black; }
      #guide-ui {
        position: fixed; top: 10px; width: 100%; text-align: center;
        z-index: 100; color: yellow; font-weight: bold;
        text-shadow: 1px 1px 2px black;
      }
    </style>
  </head>

  <body>
    <div id="guide-ui">화면을 터치하면 카메라 앞 1m 지점에 구체가 생성됩니다!</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      tap-to-place>
      
      <a-light type="ambient" intensity="1.5"></a-light>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
