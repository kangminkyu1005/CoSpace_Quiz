<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MindAR Test</title>

<!-- 1️⃣ AFRAME -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- 2️⃣ MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/targets.mind;"
color-space="sRGB"
renderer="colorManagement: true; physicallyCorrectLights: false;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-plane
src="https://threejs.org/examples/textures/uv_grid_opengl.jpg"
width="0.5"
height="0.5"
position="0 0 0"
rotation="0 0 0"
>
</a-plane>

</a-entity>

</a-scene>

</body>
</html>
