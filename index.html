<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter Face AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-攜帶.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loading">지팡이를 준비 중... (얼굴을 비춰주세요)</div>

    <a-scene mindar-face="filterMinCF:0.001; filterBeta:0.01" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 10">
            <a-text value="HARRY POTTER" 
                    position="0 0.6 0" 
                    align="center" 
                    color="#ffc500" 
                    width="2"
                    font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
            </a-text>
            <a-entity geometry="primitive: plane; width: 0.2; height: 0.4" 
                      material="color: #ffc500; shader: flat" 
                      position="0 0.3 0"
                      animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // 장면이 로드되면 로딩 메시지 숨김
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", (event) => {
            document.getElementById('loading').style.display = 'none';
        });
    </script>
</body>
</html>
