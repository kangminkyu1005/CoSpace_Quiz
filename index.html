<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>손가락 마법 AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
    canvas.output_canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; object-fit: cover; }
    #guide { position: fixed; top: 10px; width: 100%; text-align: center; color: yellow; z-index: 10; font-family: sans-serif; text-shadow: 2px 2px 2px black; }
  </style>
</head>
<body>
  <div id="guide">검지 손가락을 펴서 마법 구체를 조종하세요!</div>
  
  <video id="input_video" style="display:none;"></video>
  
  <a-scene embedded vr-mode-ui="enabled: false">
    <a-sphere id="magic-ball" radius="0.05" color="#FF8C00" material="emissive: #FF4500; emissiveIntensity: 2; shader: flat" visible="false"></a-sphere>
    
    <a-entity camera position="0 0 0"></a-entity>
    <a-light type="ambient" intensity="1.5"></a-light>
  </a-scene>

  <script>
    const videoElement = document.getElementById('input_video');
    const magicBall = document.getElementById('magic-ball');

    // MediaPipe Hands 설정
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // 8번 랜드마크: 검지 손가락 끝 (Index Finger Tip)
        const indexTip = landmarks[8];
        
        // 화면 좌표(0~1)를 A-Frame 좌표(-1.5 ~ 1.5)로 변환
        const x = (indexTip.x - 0.5) * 3;
        const y = -(indexTip.y - 0.5) * 2;
        const z = -1; // 카메라 앞 1m 지점

        magicBall.setAttribute('position', {x, y, z});
        magicBall.setAttribute('visible', true);
      } else {
        magicBall.setAttribute('visible', false);
      }
    });

    // 카메라 시작
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
