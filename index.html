<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter AR Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-face-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #loading-msg {
            position: fixed; top: 10px; left: 10px; color: #ffc500;
            background: rgba(0,0,0,0.7); padding: 10px; z-index: 1000;
            border-radius: 5px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="loading-msg">상태: 시스템 가동 중... (얼굴을 정면으로 비춰주세요)</div>

    <a-scene 
        mindar-face="filterMinCF:0.0001; filterBeta:0.001" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="hpLogo" src='data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M99.68 4.81C47.75 4.81 5 47.02 5 100.72c0 52.89 42.61 94.47 94.31 94.47 52.44 0 95.69-42.48 95.69-94.47 0-51.93-42.34-95.91-95.32-95.91zm-.37 183.1c-47.97 0-88.18-38.6-88.18-87.31 0-48.37 39.1-89.51 88.55-89.51 49.19 0 88.43 39.8 88.43 88.99 0 48.71-39.66 87.83-88.8 87.83z" fill="%23ffc500"/><path d="M174.79 104.19h-4.21c-1.97-14.97-12.26-27.37-29.11-27.37-14.34 0-26.36 10.29-30.76 22.99-3.03-2.1-5.55-2.46-8.93-2.46-3.81 0-5.87.51-8.79 2.39-3.87-12.79-14.26-22.92-30.48-22.92-15.43 0-29.13 12.14-31.66 27.37H24.91c-2.5 0-3.4 1.72-3.4 3.65 0 2.32 1.27 3.33 3.2 3.33h4.5c1.8 14.82 13.91 27.64 30.76 27.64 16.61 0 30.02-14.15 31.51-29.9l.04-3.26c2.62-2.7 5.26-3.32 8.14-3.32 3.63 0 6.1 1.38 8.53 3.43l-.06 3.15c0 14.8 12.86 29.9 31.34 29.9 15.72 0 29.14-12.74 30.99-27.97h4.22c2.34 0 3.15-1.63 3.15-3.33 0-2-1.05-3.32-3.04-3.32zM60.07 134.39c-13.95 0-25.61-12.33-25.61-26.28 0-14.35 12.52-26.49 25.9-26.49 13.95 0 26.47 12.34 26.47 26.29s-11.89 26.48-26.76 26.48zm79.11 0c-13.95 0-26.07-12.33-26.07-26.28 0-14.35 12.52-26.49 16.51-26.49 13.95 0 26.09 12.34 26.09 26.29s-12.09 26.48-26.53 26.48z" fill="%23ffc500"/><path d="M70.01 30l13.8 24.32-11.13-1.11 5.4 18.59-14.47-24.59 11.37 1.19L70.01 30z" fill="%23ffc500"/></svg>'>
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-image 
                src="#hpLogo" 
                position="0 0.1 0.1" 
                width="0.8" height="0.8" 
                material="transparent: true; alphaTest: 0.5">
            </a-image>
        </a-entity>

    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const msg = document.getElementById('loading-msg');

        // 시스템 준비 완료 시
        sceneEl.addEventListener("arReady", () => {
            msg.innerText = "상태: 마법 준비 완료! 얼굴을 비춰주세요.";
            console.log("MindAR Ready");
        });

        // 얼굴이 처음 감지되었을 때
        sceneEl.addEventListener("targetFound", () => {
            msg.innerText = "상태: 얼굴 감지 성공! ✨";
            msg.style.background = "rgba(0, 100, 0, 0.7)";
        });

        // 얼굴을 놓쳤을 때
        sceneEl.addEventListener("targetLost", () => {
            msg.innerText = "상태: 얼굴을 찾는 중... 🔍";
            msg.style.background = "rgba(100, 0, 0, 0.7)";
        });

        // 에러 발생 시
        sceneEl.addEventListener("arError", (e) => {
            msg.innerText = "상태: 오류 발생! HTTPS 접속을 확인하세요.";
            console.error(e);
        });
    </script>
</body>
</html>
