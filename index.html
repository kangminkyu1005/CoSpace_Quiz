<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR 공간 추적 조준점 버전</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('ar-tracker', {
        init: function () {
          this.reticle = document.querySelector('#reticle');
        },
        tick: function () {
          // 매 프레임마다 실행되는 함수
          const cameraEl = document.querySelector('[camera]');
          const cameraObj = cameraEl.object3D;
          
          // 카메라 정면 방향으로 1.5미터 앞의 좌표 계산
          // 이 위치가 조준점이 공간에서 머무를 위치입니다.
          const vector = new THREE.Vector3(0, 0, -1.5); 
          vector.applyQuaternion(cameraObj.quaternion);
          vector.add(cameraObj.position);

          // 조준점을 계산된 위치로 이동
          if (this.reticle) {
            this.reticle.object3D.position.copy(vector);
            // 조준점이 항상 카메라를 정면으로 바라보게 설정 (가독성)
            this.reticle.object3D.lookAt(cameraObj.position);
          }
        }
      });

      AFRAME.registerComponent('tap-to-place', {
        init: function () {
          window.addEventListener('click', () => {
            const sceneEl = this.el;
            const reticle = document.querySelector('#reticle');
            
            // 현재 조준점이 위치한 '공간 좌표' 추출
            const worldPosition = new THREE.Vector3();
            reticle.object3D.getWorldPosition(worldPosition);

            // 주황색 구체 생성 및 배치
            const newPoint = document.createElement('a-sphere');
            newPoint.setAttribute('radius', '0.1');
            newPoint.setAttribute('color', '#FF4500');
            newPoint.setAttribute('material', 'shader: flat;');
            newPoint.setAttribute('position', worldPosition);

            sceneEl.appendChild(newPoint);
          });
        }
      });
    </script>
    <style>
      body { margin: 0; overflow: hidden; background-color: black; }
      #guide-ui {
        position: fixed; top: 10px; width: 100%; text-align: center;
        z-index: 100; color: #00FF00; font-weight: bold;
        text-shadow: 1px 1px 2px black; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="guide-ui">카메라를 움직여 조준점을 이동시킨 후 클릭하세요!</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      ar-tracker
      tap-to-place>
      
      <a-light type="ambient" intensity="1.5"></a-light>

      <a-ring id="reticle" 
              radius-inner="0.04" 
              radius-outer="0.06" 
              color="#00FF00" 
              material="shader: flat; opacity: 0.8">
        <a-circle radius="0.01" color="#00FF00"></a-circle>
      </a-ring>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
