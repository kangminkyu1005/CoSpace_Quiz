<!DOCTYPE html>
<html>
  <head>
    <title>WebXR 지점 선택 AR - 코딩 파트너</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('tap-to-place', {
        init: function () {
          const sceneEl = this.el;
          
          // 화면 클릭 이벤트 리스너
          window.addEventListener('click', (event) => {
            // 레이캐스터(가상의 선) 정보 가져오기
            const touchPoint = new THREE.Vector2();
            touchPoint.x = (event.clientX / window.innerWidth) * 2 - 1;
            touchPoint.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // 터치한 지점에 새로운 '이미지 표시' 생성
            const newElement = document.createElement('a-curvedimage');
            
            // 이미지 업로드 없이 외부 샘플 이미지 사용 (800x800 랜덤 이미지)
            newElement.setAttribute('src', 'https://picsum.photos/200');
            newElement.setAttribute('height', '0.5');
            newElement.setAttribute('width', '0.5');
            
            // 카메라가 바라보는 방향의 일정 거리(2m 앞)에 배치 (간단한 구현용)
            // 실제 바닥 인식을 위해서는 WebXR Hit-test 설정이 필요하지만, 
            // 즉시 실행 가능한 코드를 위해 레이캐스터 위치에 생성합니다.
            const camera = document.querySelector('[camera]').object3D;
            const position = new THREE.Vector3(0, 0, -2); // 카메라 앞 2미터
            position.applyQuaternion(camera.quaternion);
            position.add(camera.position);

            newElement.setAttribute('position', position);
            newElement.setAttribute('look-at', '[camera]'); // 카메라를 향하게 설정
            
            sceneEl.appendChild(newElement);
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      webxr="optionalFeatures: hit-test;" 
      ar-mode-ui="enabled: true"
      tap-to-place>
      
      <a-assets>
        </a-assets>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>

    </a-scene>
  </body>
</html>
