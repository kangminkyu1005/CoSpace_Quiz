<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Potter Face AR</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

<!-- MINDAR FACE -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

#status-log{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1000;
    padding:10px;
    border-radius:5px;
    background:rgba(0,0,0,0.8);
    color:#ffc500;
    font-family:monospace;
    font-size:12px;
}
</style>

</head>

<body>

<div id="status-log">시스템 초기화 중...</div>

<a-scene
mindar-face="filterMinCF:0.001; filterBeta:0.01"
embedded
color-space="sRGB"
renderer="colorManagement:true, physicallyCorrectLights"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
>

<a-assets>

<!-- PNG 이미지 사용 권장 -->
<img id="scar" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/lightning.png">

</a-assets>

<a-camera position="0 0 0"></a-camera>

<!-- 얼굴 앵커 (이마 위치) -->
<a-entity id="faceTarget" mindar-face-target="anchorIndex:10">

<a-image
src="#scar"
position="0 0.15 0.3"
width="0.35"
height="0.6"
material="transparent:true"
></a-image>

<a-text
value="THE BOY WHO LIVED"
position="0 0.45 0.3"
align="center"
color="#ffc500"
width="2"
></a-text>

</a-entity>

</a-scene>

<script>

const log = document.getElementById("status-log");
const scene = document.querySelector("a-scene");
const target = document.querySelector("#faceTarget");

/* AR 준비 완료 */
scene.addEventListener("arReady", () => {

log.innerText = "AR 준비 완료 ✔ 얼굴을 비춰주세요";
log.style.color = "#4CAF50";

});

/* 얼굴 감지 */
target.addEventListener("targetFound", () => {

log.innerText = "얼굴 감지됨 ✨";

});

/* 얼굴 사라짐 */
target.addEventListener("targetLost", () => {

log.innerText = "얼굴을 찾는 중...";

});

/* 오류 발생 */
scene.addEventListener("arError", () => {

log.innerText = "카메라 권한 또는 HTTPS를 확인하세요";
log.style.color = "#ff5252";

});

</script>

</body>
</html>
